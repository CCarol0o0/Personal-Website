<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>London Underground Network Analysis Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5}
  #dashboard{display:grid;grid-template-columns:300px 1fr 350px;grid-template-rows:60px 1fr;height:100vh;gap:1px;background:#dee2e6}
  .header{grid-column:1/-1;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 2px 4px rgba(0,0,0,.08)}
  .control-panel{background:#fff;padding:20px;overflow-y:auto}
  .map-container{background:#fff;position:relative}
  #map{width:100%;height:100%}
  .explanation-panel{background:#fff;padding:20px;overflow-y:auto}
  .mode-selector{display:flex;gap:10px}
  .mode-btn{padding:8px 16px;border:1px solid #ddd;background:#fff;cursor:pointer;border-radius:4px;transition:all .3s}
  .mode-btn.active{background:#007bff;color:#fff;border-color:#007bff}
  .metric-card{background:#f8f9fa;padding:12px;border-radius:8px;margin-bottom:8px}
  .metric-label{font-size:12px;color:#6c757d;margin-bottom:4px}
  .metric-value{font-size:20px;font-weight:600}
  .section-title{font-size:14px;font-weight:600;color:#495057;margin:20px 0 10px;text-transform:uppercase;letter-spacing:.5px}
  .search-box,.filter-select{width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;margin-bottom:10px}
  .station-list{max-height:300px;overflow-y:auto;border:1px solid #e9ecef;border-radius:4px}
  .station-item{padding:8px 12px;border-bottom:1px solid #f1f3f5;cursor:pointer;font-size:14px;display:flex;justify-content:space-between;align-items:center;transition:background .2s}
  .station-item:hover{background:#f8f9fa}
  .severity-badge{display:inline-block;width:8px;height:8px;border-radius:50%}
  .severity-severe{background:#dc3545}.severity-moderate{background:#ffc107}.severity-mild{background:#28a745}.severity-normal{background:#6c757d}
  .detail-card{background:#f8f9fa;padding:15px;border-radius:8px;margin-bottom:15px}
  .detail-title{font-weight:600;margin-bottom:10px;color:#212529}
  .progress-bar{height:20px;background:#e9ecef;border-radius:4px;overflow:hidden;margin:5px 0}
  .progress-fill{height:100%;background:#007bff;display:flex;align-items:center;padding:0 8px;color:#fff;font-size:12px}
  .leaflet-popup-content{min-width:150px}
  .leaflet-tooltip.station-label{pointer-events:none;font-size:11px;background:rgba(255,255,255,.75);border:0;box-shadow:none;transition:opacity .15s}
  .hidden{display:none}
</style>
</head>
<body>
  <div id="dashboard">
    <div class="header">
      <h1 style="font-size:20px;font-weight:600">London Underground Network Analysis Dashboard</h1>
      <div class="mode-selector">
        <button class="mode-btn active" data-mode="community">Community Detection</button>
        <button class="mode-btn" data-mode="anomaly">Anomaly Detection</button>
        <button class="mode-btn" data-mode="link">Link Prediction</button>
      </div>
      <div style="font-size:14px;color:#6c757d">Updated: 2025-09-24T15:54</div>
    </div>

    <div class="control-panel">
      <div class="section-title">Global Metrics</div>
      <div id="global-metrics"></div>

      <div class="section-title">Filters</div>
      <input type="text" class="search-box" id="search" placeholder="Search stations...">
      <select class="filter-select" id="community-filter"><option value="all">All Communities</option></select>
      <select class="filter-select" id="anomaly-filter" class="hidden">
        <option value="all">All Anomaly Levels</option>
        <option value="severe">Severe Only</option>
        <option value="moderate">Moderate Only</option>
        <option value="mild">Mild Only</option>
        <option value="normal">Normal Only</option>
      </select>

      <div class="section-title">Station List</div>
      <div class="station-list" id="station-list"></div>
    </div>

    <div class="map-container"><div id="map"></div></div>

    <div class="explanation-panel">
      <div id="station-details">
        <div style="padding:40px;text-align:center;color:#6c757d">Select a station to view details</div>
      </div>
    </div>
  </div>

st-pancras"}, {"to": "st-paul's", "from_name": "King's Cross St. Pancras", "to_name": "St. Paul's", "score": 0.5869854609277747, "distance_km": 2.5242484990766942, "efficiency": 0.2393868318031747, "geographic": 0.8909734834206248, "community": 1.0, "cross_community": true, "from": "king's-cross-st-pancras"}], "metrics": {"modularity": 0.916, "coverage": 0.963, "n_communities": 26, "n_nodes": 574, "n_edges": 807, "n_stations": 415, "n_anomaly_severe": 29, "n_anomaly_moderate": 29, "n_anomaly_total": 115}, "generated_at": "2025-09-24T15:54:27.301541"};
let map=null, baseLayer=null, markers={}, currentMode='community', selectedStation=null, linkLines=[];
const LABEL_ZOOM_THRESHOLD = 13;
const BASEMAP_OPACITY = 0.35; // 底图透明度（越小越淡）

document.addEventListener('DOMContentLoaded', () => {
  initMap();
  createMarkers();
  updateDisplay();
  setupEventListeners();
  populateFilters();
  updateStationList();
  updateLabelVisibility();
  toggleAnomalyUI();
});

function initMap(){
  map = L.map('map').setView([51.505,-0.09], 11);
  baseLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors',
    opacity: BASEMAP_OPACITY
  }).addTo(map);
  map.on('zoomend', updateLabelVisibility);
}

function clearSelection(){
  selectedStation = null;
  Object.values(markers).forEach(({marker})=>{
    marker.setStyle({weight:2, color:'#fff'});
  });
  updateStationDetails();
}

function toggleAnomalyUI(){
  const sel = document.getElementById('anomaly-filter');
  if (currentMode==='anomaly'){
    sel.classList.remove('hidden');
  } else {
    sel.classList.add('hidden');
    sel.value = 'all';
  }
}

function updateLabelVisibility(){
  const show = map.getZoom() >= LABEL_ZOOM_THRESHOLD;
  Object.values(markers).forEach(({marker})=>{
    const tt = marker.getTooltip && marker.getTooltip();
    if (tt && tt.getElement()){
      tt.getElement().style.opacity = show ? "0.9" : "0";
    }
  });
}

function getStationColor(st){
  if (currentMode==='community'){
    const c = networkData.communities.find(x=>x.id===st.community);
    return c ? c.color : '#999';
  } else if (currentMode==='anomaly'){
    const colors = {severe:'#dc3545', moderate:'#ffc107', mild:'#28a745', normal:'#6c757d'};
    const lvl = (st.anomaly_level || 'normal').toLowerCase();
    return colors[lvl] || '#999';
  } else return '#007bff';
}

function createMarkers(){
  networkData.stations.forEach(st=>{
    if (!(st.lat && st.lon)) return;
    const marker = L.circleMarker([st.lat, st.lon], {
      radius: Math.min(Math.sqrt(st.degree)*2, 15),
      fillColor: getStationColor(st), color:'#fff', weight:2, opacity:1, fillOpacity:0.7
    }).addTo(map);

    marker.bindPopup(`<strong>${st.name}</strong><br>
      Community: ${st.community}<br>
      Degree: ${st.degree}<br>
      Lines: ${st.lines.join(', ') || 'N/A'}`);

    marker.bindTooltip(st.name, {permanent:true, direction:'top', className:'station-label', offset:[0,-5], opacity:0.9});
    marker.on('click', ()=>selectStation(st));

    markers[st.id] = {marker, station: st};
  });
}

function selectStation(st){
  selectedStation = st;
  map.setView([st.lat, st.lon], Math.max(map.getZoom(), 14));
  updateStationDetails();
  Object.values(markers).forEach(({marker,station})=>{
    marker.setStyle({weight: station.id===st.id ? 4 : 2, color: station.id===st.id ? '#333' : '#fff'});
  });
}

function drawPressureChart(st){
  const ctx = document.getElementById('pressure-chart').getContext('2d');
  new Chart(ctx, {
    type:'line',
    data:{ labels:['Early','AM Peak','Midday','PM Peak','Evening','Late','Total'],
      datasets:[{label:'Pressure', data: st.pressure, borderColor:'#dc3545', backgroundColor:'rgba(220,53,69,.1)', tension:.4}]},
    options:{responsive:true, maintainAspectRatio:false, scales:{y:{beginAtZero:true}}}
  });
}

function linkDetailBlock(link){
  return `
    <div class="station-item" data-jump="${link.from}|${link.to}">
      <div style="display:flex;flex-direction:column;gap:4px">
        <span>→ ${link.from_name || link.from} ⇄ ${link.to_name || link.to}</span>
        <span style="font-size:12px;color:#6c757d">
          score ${link.score.toFixed(3)} • dist ${link.distance_km.toFixed(1)} km • eff ${link.efficiency.toFixed(3)} • geo ${link.geographic.toFixed(3)} • comm ${link.community.toFixed(3)} • ${link.cross_community ? 'cross-comm' : 'within-comm'}
        </span>
      </div>
    </div>`;
}

function updateStationDetails(){
  // 当未选站且非 link 模式：保留默认提示
  if (!selectedStation && currentMode!=='link'){
    document.getElementById('station-details').innerHTML =
      '<div style="padding:40px;text-align:center;color:#6c757d">Select a station to view details</div>';
    return;
  }

  const st = selectedStation;
  let html = st ? `<h2 style="margin-bottom:20px">${st.name}</h2>` : '';

  if (currentMode==='community' && st){
    html += `
      <div class="detail-card">
        <div class="detail-title">Community Membership</div>
        <div>Community ${st.community}</div>
        <div style="margin-top:5px;color:#6c757d">Degree: ${st.degree}</div>
        <div style="color:#6c757d">Platform Count: ${st.platform_count}</div>
      </div>
      <div class="detail-card">
        <div class="detail-title">Node Role Analysis</div>
        <div class="metric-label">Participation Coefficient</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(st.participation*100,100)}%">${st.participation.toFixed(3)}</div></div>
        <div class="metric-label" style="margin-top:8px">Within-Module Z-Score</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min((st.zscore+2)*25,100)}%">${st.zscore.toFixed(3)}</div></div>
      </div>
      <div class="detail-card">
        <div class="detail-title">Lines</div>
        <div>${st.lines.join(', ') || 'No line information'}</div>
      </div>`;
  }
  else if (currentMode==='anomaly' && st){
    const clr = {severe:'#dc3545',moderate:'#ffc107',mild:'#28a745',normal:'#6c757d'};
    const lvl = (st.anomaly_level||'normal').toLowerCase();
    html += `
      <div class="detail-card">
        <div class="detail-title">Anomaly Analysis</div>
        <div>Level: <strong style="color:${clr[lvl]||'#6c757d'}">${lvl.toUpperCase()}</strong></div>
        <div>Score: ${st.anomaly_score.toFixed(3)}</div>
      </div>
      <div class="detail-card">
        <div class="detail-title">Pressure Time Series</div>
        <div style="height:180px"><canvas id="pressure-chart"></canvas></div>
      </div>`;
  }
  else if (currentMode==='link'){
    if (selectedStation) {
      html += `
        <div style="margin-bottom:10px;">
          <button id="btn-back-links" style="padding:6px 10px;border:1px solid #ddd;background:#fff;border-radius:4px;cursor:pointer">
            ← All recommendations
          </button>
        </div>`;
    }
    const all = networkData.links || [];
    const avg = all.length ? (all.reduce((a,b)=>a+b.score,0)/all.length) : 0;
    html += `
      <div class="detail-card">
        <div class="detail-title">Overall</div>
        <div>Recommendations: <b>${all.length}</b></div>
        <div>Average Score: <b>${avg.toFixed(3)}</b></div>
      </div>`;
    const list = selectedStation ? all.filter(l => l.from===selectedStation.id || l.to===selectedStation.id) : all.slice(0, 20);
    if (list.length){
      html += '<div class="detail-card"><div class="detail-title">Link Recommendations</div>';
      list.forEach(link => { html += linkDetailBlock(link); });
      html += '</div>';
    } else {
      html += '<div class="detail-card">No related link recommendations</div>';
    }
  }

  document.getElementById('station-details').innerHTML = html;

  if (currentMode==='anomaly' && st && document.getElementById('pressure-chart')){
    setTimeout(()=>drawPressureChart(st), 50);
  }

  // 推荐条目点击跳转（在注入 HTML 之后绑定）
  document.querySelectorAll('[data-jump]').forEach(el => {
    el.addEventListener('click', () => {
      const ids = (el.getAttribute('data-jump') || '').split('|');
      const A = networkData.stations.find(s => s.id === ids[0]);
      const B = networkData.stations.find(s => s.id === ids[1]);
      if (B) selectStation(B);
      if (A && B) {
        const poly = L.polyline([[A.lat, A.lon], [B.lat, B.lon]], { color:'#007bff', weight:3, opacity:0.6 }).addTo(map);
        setTimeout(() => map.removeLayer(poly), 2500);
      }
    }, { once: true });
  });

  // 返回全部推荐
  const backBtn = document.getElementById('btn-back-links');
  if (backBtn) {
    backBtn.addEventListener('click', () => {
      clearSelection();
      updateDisplay();
      updateStationDetails();
    }, { once: true });
  }
}

function updateGlobalMetrics(){
  let html='';
  if (currentMode==='community'){
    html = `
      <div class="metric-card"><div class="metric-label">Modularity</div><div class="metric-value">${networkData.metrics.modularity.toFixed(3)}</div></div>
      <div class="metric-card"><div class="metric-label">Communities</div><div class="metric-value">${networkData.metrics.n_communities}</div></div>
      <div class="metric-card"><div class="metric-label">Coverage</div><div class="metric-value">${networkData.metrics.coverage.toFixed(3)}</div></div>`;
  } else if (currentMode==='anomaly'){
    html = `
      <div class="metric-card"><div class="metric-label">Severe Anomalies</div><div class="metric-value" style="color:#dc3545">${networkData.metrics.n_anomaly_severe}</div></div>
      <div class="metric-card"><div class="metric-label">Moderate Anomalies</div><div class="metric-value" style="color:#ffc107">${networkData.metrics.n_anomaly_moderate}</div></div>
      <div class="metric-card"><div class="metric-label">Total Anomalies</div><div class="metric-value">${networkData.metrics.n_anomaly_total}</div></div>`;
  } else {
    const all = networkData.links || [];
    const avg = all.length ? (all.reduce((a,b)=>a+b.score,0)/all.length) : 0;
    html = `
      <div class="metric-card"><div class="metric-label">Recommended Links</div><div class="metric-value">${all.length}</div></div>
      <div class="metric-card"><div class="metric-label">Average Score</div><div class="metric-value">${avg.toFixed(3)}</div></div>`;
  }
  document.getElementById('global-metrics').innerHTML = html;
}

function updateMapColors(){
  Object.values(markers).forEach(({marker,station})=>{
    marker.setStyle({fillColor:getStationColor(station)});
  });
}

function updateLinkLines(){
  linkLines.forEach(l=>map.removeLayer(l));
  linkLines = [];
  if (currentMode!=='link') return;
  const subset = (networkData.links||[]).slice(0, 200);
  subset.forEach(link=>{
    const A = networkData.stations.find(s=>s.id===link.from);
    const B = networkData.stations.find(s=>s.id===link.to);
    if (!A || !B) return;
    const poly = L.polyline([[A.lat,A.lon],[B.lat,B.lon]],{
      color: link.cross_community ? '#dc3545' : '#007bff',
      weight: Math.max(link.score*5, 1.5),
      opacity: 0.45,
      dashArray: link.cross_community ? '6,10' : null
    }).addTo(map);
    poly.bindPopup(`${A.name} ⇄ ${B.name}<br>Score: ${link.score.toFixed(3)}<br>
      dist ${link.distance_km.toFixed(1)} km • eff ${link.efficiency.toFixed(3)} • geo ${link.geographic.toFixed(3)} • comm ${link.community.toFixed(3)} • ${link.cross_community ? 'cross-comm' : 'within-comm'}`);
    linkLines.push(poly);
  });
}

function updateDisplay(){
  updateGlobalMetrics();
  updateMapColors();
  updateLinkLines();
  updateLabelVisibility();
  toggleAnomalyUI();
}

function updateStationList(){
  const term = (document.getElementById('search').value||'').toLowerCase().trim();
  const communityFilter = document.getElementById('community-filter').value;
  const anomalySelect = document.getElementById('anomaly-filter');
  const anomalyFilter = (currentMode==='anomaly') ? (anomalySelect.value||'all').toLowerCase() : 'all';

  let filtered = networkData.stations.filter(st=>{
    const nameOK = !term || (st.name||'').toLowerCase().includes(term);
    const commOK = communityFilter==='all' || String(st.community)===String(communityFilter);
    const lvl = (st.anomaly_level||'normal').toLowerCase();
    const anomOK = anomalyFilter==='all' || lvl===anomalyFilter;
    return nameOK && commOK && anomOK;
  });

  if (currentMode==='anomaly') filtered.sort((a,b)=>b.anomaly_score-a.anomaly_score);
  else filtered.sort((a,b)=>b.degree-a.degree);

  let html='';
  filtered.slice(0,200).forEach(st=>{
    if (currentMode==='anomaly'){
      const lvl = (st.anomaly_level||'normal').toLowerCase();
      html += `<div class="station-item" data-station-id="${st.id}">
        <span>${st.name}</span><span class="severity-badge severity-${lvl}"></span></div>`;
    } else {
      html += `<div class="station-item" data-station-id="${st.id}"><span>${st.name}</span></div>`;
    }
  });
  document.getElementById('station-list').innerHTML = html;

  document.querySelectorAll('.station-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.getAttribute('data-station-id');
      const st = networkData.stations.find(s=>s.id===id);
      if (st) selectStation(st);
    });
  });

  const setVisible = new Set(filtered.map(s=>s.id));
  Object.values(markers).forEach(({marker,station})=>{
    const vis = setVisible.has(station.id);
    marker.setStyle({opacity: vis?1:0.2, fillOpacity: vis?0.7:0.1});
  });
}

function populateFilters(){
  const sel = document.getElementById('community-filter');
  let opts = '<option value="all">All Communities</option>';
  networkData.communities.slice().sort((a,b)=>a.id-b.id).forEach(c=>{
    opts += `<option value="${c.id}">Community ${c.id} (${c.station_count} stations)</option>`;
  });
  sel.innerHTML = opts;
}

function setupEventListeners(){
  document.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.addEventListener('click', function(){
      document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      currentMode = this.dataset.mode;
      updateDisplay();
      if (selectedStation) updateStationDetails();
      updateStationList();
    });
  });

  document.getElementById('search').addEventListener('input', updateStationList);
  document.getElementById('search').addEventListener('keydown', e=>{
    if (e.key==='Enter'){
      const q = (e.target.value||'').toLowerCase().trim();
      const first = networkData.stations.find(s=>(s.name||'').toLowerCase().includes(q));
      if (first) selectStation(first);
    }
  });
  document.getElementById('community-filter').addEventListener('change', updateStationList);
  document.getElementById('anomaly-filter').addEventListener('change', ()=>{ if(currentMode==='anomaly') updateStationList(); });
}
</script>
</body>
</html>
